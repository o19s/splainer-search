# Javascript Node CircleCI 2.0 configuration file
#
# Check {{ '/2.0/language-javascript/' | docs_url }} for more details
#
version: 2

defaults: &defaults
  working_directory: ~/repo
  docker:
    # Vitest 4 / Rolldown require util.styleText (Node >= 20.12); pin a current LTS for CI.
    - image: cimg/node:22.14

jobs:
  test-build:
    <<: *defaults
    steps:
      - checkout

      - run: npm install
      - run:
          name: Lint, unit tests, and local integration test
          command: npm run test:ci
      - run:
          name: Run build
          command: npm run build

      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "package.json" }}

      - persist_to_workspace:
          root: ~/repo
          paths: .

workflows:
  version: 2
  test-build-deploy:
    jobs:
      - test-build:
          filters:
            tags:
              only: /^v.*/
